<!DOCTYPE html>
<meta charset="utf-8">

<!-- Load d3.js -->
<script src="https://d3js.org/d3.v4.js"></script>

<!-- Create a div where the graph will take place -->
<div id="my_dataviz"></div>

<script>

//const runfunc = async () => {
//const data =  await d3.csv('https://ammaralzureiqi.github.io/COVID%20Data/owid-covid-latest.csv');


var margin = {top: 20, right: 30, bottom: 40, left: 90},
    width = 460 - margin.left - margin.right,
    height = 1000 - margin.top - margin.bottom;

var svg = d3.select("#my_dataviz")
    .append("svg")
        .attr("width", width + margin.left + margin.right)
        .attr("height", height + margin.top + margin.bottom)
    .append("g")
        .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

d3.csv('https://ammaralzureiqi.github.io/COVID%20Data/owid-covid-latest.csv', function(data) {
    
    country = []
    permill = []

for (let i = 0; i < (250/3); i++) {
    country[i] = data[i].location
    permill[i] = data[i]['total_cases_per_million']
}

data1 = [country, permill]
// Add X axis
var x = d3.scaleLinear()
  .domain([300, 737555])
  .range([ 0, width]);
svg.append("g")
  .attr("transform", "translate(0," + height + ")")
  .call(d3.axisBottom(x))
  .selectAll("text")
    .attr("transform", "translate(-10,0)rotate(-45)")
    .style("text-anchor", "end");

// Y axis
var y = d3.scaleBand()
  .range([ 0, height ])
  .domain(data1[0].map(function(d) { return d; }))
  .padding(.1);
svg.append("g")
  .call(d3.axisLeft(y))

  temp = {a:data1[0]}, {b:data1[1]}
  console.log(temp.a)

  //Bars
svg.selectAll("myRect")
  .data(temp)
  .enter()
  .append("rect")
  .attr("x", x(0) )
  .attr("y", function(d) { return y(data1[0]); })
  .attr("width", function(d) { return x(temp.b); })
  .attr("height", y.bandwidth() )
  .attr("fill", "#69b3a2")


  // .attr("x", function(d) { return x(d.Country); })
  // .attr("y", function(d) { return y(d.Value); })
  // .attr("width", x.bandwidth())
  // .attr("height", function(d) { return height - y(d.Value); })
  // .attr("fill", "#69b3a2")

})



//}
//runfunc();

</script>
