<html>
<body>
<h1>Hello World</h1>
<p>I'm hosted with GitHub Pages.</p>
</body>
<script src='https://d3js.org/d3.v5.min.js'></script>
<div id="my_dataviz"></div>
<body onload='init()'>
<svg width=1000 height=800></svg>
<div class="tooltip" style="display: none;"></div>
<script>
async function init() {

const data = await d3.csv('https://ammaralzureiqi.github.io/COVID%20Data/full_grouped.csv');
var svg = d3.select("svg"),
  margin = 200,
  width = svg.attr("width") - margin,
  height = svg.attr("height") - margin;
            
var xScale = d3.scaleLinear().domain([0,77255]).range([0, width]);
var yScale = d3.scaleLinear().domain([0,140050]).range([height, 0]);
var margin = "50";

const tooltip = d3.select(".tooltip");

svg.append('text')
  .attr('x', 500)
  .attr('y', 50)
  .attr('text-anchor', 'middle')
  .style('font-family', 'Helvetica')
  .style('font-size', 20)
  .text('COVID: Confirmed vs Deaths');
        
svg.append('text')
  .attr('x', 550)
  .attr('y', height - 15 + 150)
  .attr('text-anchor', 'middle')
  .attr('transform', 'translate(-50,-50)')
  .style('font-family', 'Helvetica')
  .style('font-size', 12)
  .text('Confirmed');
        
svg.append('text')
  .attr('text-anchor', 'middle')
  .attr('transform', 'translate(50,350) rotate(-90)')
  .style('font-family', 'Helvetica')
  .style('font-size', 12)
  .text('Deaths');

svg.append("g")
  .attr("transform", "translate(100 , 650)")
  .call(d3.axisBottom(xScale));
        
svg.append("g")
  .attr("transform", "translate(100, "+margin+")")
  .call(d3.axisLeft(yScale));

svg.append('g')
  .selectAll("dot")
  .data(data)
  .enter()
  .append("circle")
  .attr("cx", function (d) { return xScale(d['New cases']); } )
  .attr("cy", function (d) { return yScale(d['New recovered']); } )
  .attr("transform", "translate(100 , 50)")
  .attr("r", 3)
  .style("fill", "#3498DB");
        


}
</script>
</body>
</html>
