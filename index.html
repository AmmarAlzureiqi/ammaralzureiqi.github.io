<html>
<body>
<h1>Hello World</h1>
<p>I'm hosted with GitHub Pages.</p>
</body>
<script src='https://d3js.org/d3.v5.min.js'></script>
<body onload='init()'>
<svg width=300 height=300>
</svg>
<script>
async function init() {

const data = await d3.csv('https://ammaralzureiqi.github.io/COVID%20Data/country_wise_latest.csv');

function tabulate(data, columns) {
	var table = d3.select('body').append('table')
	var thead = table.append('thead')
	var	tbody = table.append('tbody');

	thead.append('tr')
	  .selectAll('th')
	  .data(columns).enter()
	  .append('th')
	    .text(function (column) { return column; });

	var rows = tbody.selectAll('tr')
	  .data(data)
	  .enter()
	  .append('tr');

	var cells = rows.selectAll('td')
	  .data(function (row) {
	    return columns.map(function (column) {
	      return {column: column, value: row[column]};
	    });
	  })
	  .enter()
	  .append('td')
	    .text(function (d) { return d.value; });

  return table;
}

tabulate(data, ['Country/Region','Confirmed','Deaths','Recovered','Active','New cases',
'New deaths','New recovered','Deaths / 100 Cases', 'Recovered / 100 Cases','Deaths / 100 Recovered',
'Confirmed last week','1 week change','1 week % increase','WHO Region']);
}
</script>
</body>
</html>
